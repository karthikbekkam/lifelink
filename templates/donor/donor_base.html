<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Donor Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/donor.css') }}">

</head>

<body>

<div class="d-flex">

<div class="sidebar">

<h3 class="text-center text-white py-4">

🩸 LifeLink

</h3>

<a href="{{ url_for('donor.dashboard') }}">

<i class="fas fa-home"></i>

Dashboard

</a>

<a href="{{ url_for('donor.profile') }}">

<i class="fas fa-user"></i>

My Profile

</a>

<a href="{{ url_for('donor.requests') }}">

<i class="fas fa-heart"></i>

Blood Requests

</a>

<a href="{{ url_for('donor.history') }}">

<i class="fas fa-history"></i>


Donation History

</a>
<li class="nav-item">

    <a class="nav-link"

       href="{{ url_for('home.hospitals') }}">

        <i class="fas fa-hospital"></i>

        Nearby Hospitals

    </a>

</li>

<a href="{{ url_for('auth.logout') }}">

<i class="fas fa-sign-out-alt"></i>

Logout

</a>

</div>

<div class="content flex-grow-1 p-4">

{% block content %}

{% endblock %}

</div>

</div>

</body>

</html>
